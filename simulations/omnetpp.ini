[General]
# ---------------------------------------------------------------
# General settings applied to ALL configurations
# ---------------------------------------------------------------
network = forestfiresim.ForestFire

# Simulation duration: 1 simulated hour
sim-time-limit = 3600s

# 30 independent Monte Carlo replications per configuration
repeat = 30

# Each repetition gets a different seed for ALL RNG streams
# ${repetition} is OMNeT++'s built-in variable (0, 1, 2, ... repeat-1)
seed-set = ${repetition}

# Output files go to results/
result-dir = results

# Record vectors and scalars
**.scalar-recording = true
**.vector-recording = true

# Warm-up period: discard first 300s to reach steady state (Welch's method)
warmup-period = 300s

# ---------------------------------------------------------------
# FireGen parameters
# ---------------------------------------------------------------
**.fireGen.numZones    = 4
**.fireGen.influenceRadius = 200m

# ---------------------------------------------------------------
# SensorApp parameters
# ---------------------------------------------------------------
**.app.meanTelemetryInterval = 60s
**.app.fireDetectionProb     = 0.90
**.app.falseAlarmProb        = 0.01
**.app.baseTempMu            = 25.0
**.app.baseTempSigma         = 3.0
**.app.baseHumMu             = 60.0
**.app.baseHumSigma          = 5.0
**.app.tempThreshold         = 60.0
**.app.smokeThreshold        = 0.7

# Assign zoneId to each node based on its index
# Nodes 0..9 -> zone 0, 10..19 -> zone 1, etc.
**.node[*].app.nodeId = index
**.node[*].app.zoneId = index % 4

# ---------------------------------------------------------------
# GatewayQueue parameters
# ---------------------------------------------------------------
**.queue.capacity        = 50
**.queue.meanServiceTime = 0.1s

# ---------------------------------------------------------------
# FLoRa LoRa physical layer settings
# ---------------------------------------------------------------
**.loRaNodes[*].**.initialLoRaSF    = 7       # Spreading Factor 7 (fastest)
**.loRaNodes[*].**.initialLoRaBW    = 125000  # 125 kHz bandwidth
**.loRaNodes[*].**.initialLoRaCR    = 1       # Coding Rate 4/5
**.loRaNodes[*].**.initialLoRaTP    = 14dBm   # Transmission power
**.loRaGW[*].**.initialLoRaSF       = 7
**.LoRaMedium.**.minSNIR            = -5dB

# ---------------------------------------------------------------
# INET backend settings
# ---------------------------------------------------------------
**.configurator.config = xml("<config><interface hosts='*' address='10.0.0.x' netmask='255.255.255.0'/></config>")


# ==============================================================
# CONFIGURATION 1: Baseline
# 40 nodes, 2 gateways, fire rate 0.005/s
# ==============================================================
[Config Baseline]
description = "Baseline: 40 nodes, 2 gateways, fireRate=0.005"

**.numNodes     = 40
**.numGateways  = 2
**.fireGen.fireRate = 0.005


# ==============================================================
# CONFIGURATION 2: Dense Nodes (parameter sweep)
# Vary number of sensor nodes to study scalability
# ==============================================================
[Config DenseNodes]
description = "Sweep numNodes from 20 to 100"

**.numNodes     = ${N=20, 40, 60, 80, 100}
**.numGateways  = 2
**.fireGen.fireRate = 0.005


# ==============================================================
# CONFIGURATION 3: Multi-Gateway (parameter sweep)
# Vary number of gateways to study redundancy benefit
# ==============================================================
[Config MultiGateway]
description = "Sweep numGateways from 1 to 3"

**.numNodes     = 40
**.numGateways  = ${G=1, 2, 3}
**.fireGen.fireRate = 0.005


# ==============================================================
# CONFIGURATION 4: High Fire Rate (stress test)
# ==============================================================
[Config HighFireRate]
description = "High fire rate stress test"

**.numNodes     = 40
**.numGateways  = 2
**.fireGen.fireRate = ${FR=0.001, 0.005, 0.01, 0.02}


# ==============================================================
# CONFIGURATION 5: Reporting Policy Comparison
# Compare fixed-interval vs event-driven telemetry
# ==============================================================
[Config FixedInterval]
description = "Fixed interval telemetry: every 60s"
**.numNodes     = 40
**.numGateways  = 2
**.fireGen.fireRate = 0.005
**.app.meanTelemetryInterval = 60s

[Config AdaptiveInterval]
description = "Adaptive telemetry: faster when near threshold (30s)"
**.numNodes     = 40
**.numGateways  = 2
**.fireGen.fireRate = 0.005
**.app.meanTelemetryInterval = 30s   # proxy for adaptive: shorter mean interval
