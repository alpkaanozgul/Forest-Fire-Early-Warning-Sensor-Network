# =============================================================================
# omnetpp.ini  –  ForestFire Early Warning Sensor Network
# CNG 476 – System Simulation, Spring 2025-2026
# METU Northern Cyprus Campus
# =============================================================================
#
# Simulation model:
#   N sensor nodes → G GatewayQueue (M/M/1/K) → FireServer
#   FireGen generates Poisson fire events (λ_fire)
#   SensorApp produces Exp-distributed telemetry and Bernoulli-triggered alarms
#
# Monte Carlo:  repeat = 30 independent replications per configuration
# Warm-up:      300 s (discarded via warmup-period to reach steady state)
# Duration:     3600 s simulated time
#
# Parameter sweeps:
#   numNodes ∈ {20, 40, 60, 80, 100}       (Config: DenseNodes)
#   λ_fire   ∈ {0.001, 0.005, 0.01, 0.02} (Config: HighFireRate)
#   numGateways ∈ {1, 2, 3}                (Config: MultiGateway)
#

[General]
network          = forestfiresim.ForestFire
ned-path         = ../src
sim-time-limit   = 3600s
warmup-period    = 300s
repeat           = 30
seed-set         = ${repetition}     # each repetition gets a unique seed
result-dir       = results
num-rngs         = 5          # 5 independent streams per module (0-4)

**.scalar-recording = true
**.vector-recording = true

# Use Mersenne Twister (higher quality than default LCG)
rng-class = "cMersenneTwister"

# =============================================================================
# FireGen (Poisson fire process)
# =============================================================================
**.fireGen.fireRate           = 0.005      # λ_fire: events/s (default baseline)
**.fireGen.influenceRadius   = 200        # metres
**.fireGen.numZones          = 2          # Zone A and Zone B
**.fireGen.numZonesToAffect  = 1          # each fire is localized to 1 zone

# =============================================================================
# SensorApp parameters  (applied to all node[*])
# =============================================================================
# Assign nodeId and zoneId per node (used for RNG stream isolation)
**.node[*].nodeId = index
**.node[*].zoneId = int(index / 4)   # nodes 0-3 → Zone A (0), nodes 4-7 → Zone B (1)

**.node[*].meanTelemetryInterval = 30s   # T: Exp(1/T) inter-transmission (LoRa sensor reporting every ~30s)
**.node[*].fireDetectionProb     = 0.90  # pd: Bernoulli detection probability
**.node[*].falseAlarmProb        = 0.01  # pf: Bernoulli false-alarm probability
**.node[*].baseTempMu            = 25.0  # Normal(μ, σ) temperature baseline
**.node[*].baseTempSigma         = 3.0
**.node[*].baseHumMu             = 60.0  # Normal humidity baseline
**.node[*].baseHumSigma          = 5.0
**.node[*].tempThreshold         = 60.0
**.node[*].smokeThreshold        = 0.7

# =============================================================================
# GatewayQueue parameters  (M/M/1/K)
# =============================================================================
**.gatewayQueue[*].capacity        = 10     # K: finite buffer (4 nodes/zone rarely exceed 3-4 queued)
**.gatewayQueue[*].meanServiceTime = 5s     # 1/μ: LoRa SF12 airtime ~1-5s; ρ = (4/30)*5 ≈ 0.67

# =============================================================================
# FLoRa LoRa physical-layer settings
# (applies to loRaGW[*] demodulator endpoints in LoRaMedium)
# =============================================================================
**.loRaGW[*].**.initFromDisplayString = false
**.LoRaGWNic.radio.iAmGateway         = true
**.LoRaMedium.pathLossType            = "LoRaLogNormalShadowing"
**.sigma                               = 3.57       # log-normal shadowing std dev
**.minInterferenceTime                 = 0s
**.maxTransmissionDuration             = 4s

# =============================================================================
# CONFIG 1: Baseline
# 40 nodes, 2 gateways, λ_fire = 0.005/s
# =============================================================================
[Config Baseline]
description = "Baseline: N=40, G=2, λ=0.005"

**.numNodes    = 8
**.numGateways = 2
**.fireGen.fireRate = 0.005


# =============================================================================
# CONFIG 2: Dense Nodes sweep (N ∈ {4, 8, 12, 16, 20}, always even → 2 gateways)
# Fixed G=2, λ=0.005; study scalability and gateway congestion
# =============================================================================
[Config DenseNodes]
description = "Sweep numNodes ∈ {4,8,12,16,20}, G=2, λ=0.005"

**.numNodes    = ${N=4, 8, 12, 16, 20}
**.numGateways = 2
**.fireGen.fireRate = 0.005


# =============================================================================
# CONFIG 3: Multi-Gateway sweep (G ∈ {1, 2, 3})
# Fixed N=8, λ=0.005; assess redundancy benefit
# =============================================================================
[Config MultiGateway]
description = "Sweep numGateways ∈ {1,2,3}, N=8, λ=0.005"

**.numNodes    = 8
**.numGateways = ${G=1, 2, 3}
**.fireGen.fireRate = 0.005


# =============================================================================
# CONFIG 4: Fire Rate sweep (λ_fire ∈ {0.001, 0.005, 0.01, 0.02})
# Fixed N=1, G=1; stress test alarm load
# =============================================================================
[Config HighFireRate]
description = "Sweep λ_fire ∈ {0.001,0.005,0.01,0.02}, N=1, G=1"

**.numNodes    = 8
**.numGateways = 2
**.fireGen.fireRate = ${FR=0.001, 0.005, 0.01, 0.02}


# =============================================================================
# CONFIG 5: Reporting policy comparison
# Fixed interval (60 s) vs. adaptive (30 s mean) telemetry
# =============================================================================
[Config FixedInterval]
description = "Fixed telemetry interval: T_mean=30s (baseline)"
**.numNodes    = 8
**.numGateways = 2
**.fireGen.fireRate = 0.005
**.node[*].meanTelemetryInterval = 30s

[Config AdaptiveInterval]
description = "Adaptive telemetry: higher load T_mean=15s (ρ≈0.87)"
**.numNodes    = 8
**.numGateways = 2
**.fireGen.fireRate = 0.005
**.node[*].meanTelemetryInterval = 15s
